<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Checklist Pre-Salida — MotoMecánica</title>
    <link rel="stylesheet" href="/style.css">
  </head>

  <body>
    <nav>
      <a href="/">Inicio</a>
      <a href="/diagnostico">Diagnóstico</a>
      <a href="/mantenimiento">Mantenimiento</a>
      <a href="/guia">Guía</a>
      <a href="/checklist">Checklist</a>
    </nav>

    <header>
      <h1>Checklist Pre-Salida</h1>
      <p>Verifica que tu moto esté lista antes de salir.</p>
    </header>

    <main>
      <section>
        <form>
          <input type="checkbox" id="c1" />
          <label for="c1">Nivel de aceite</label><br />
          <input type="checkbox" id="c2" />
          <label for="c2">Presión de llantas</label><br />
          <input type="checkbox" id="c3" />
          <label for="c3">Luces delanteras</label><br />
          <input type="checkbox" id="c4" />
          <label for="c4">Luces traseras</label><br />
          <input type="checkbox" id="c5" /> <label for="c5">Frenos</label><br />
          <input type="checkbox" id="c6" /> <label for="c6">Combustible</label
          ><br />
          <input type="checkbox" id="c7" /> <label for="c7">Cadena</label><br />
          <input type="checkbox" id="c8" /> <label for="c8">Espejos</label
          ><br /><br />

          <button type="button" id="btnChecklist">Ver resumen</button>
        </form>
      </section>
    </main>

    <footer>
      <p>MotoMecánica Web — Proyecto académico</p>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
